; cPanel-generated php ini directives, do not edit
; Manual editing of this file may result in unexpected behavior.
; To make changes to this file, use the cPanel MultiPHP INI Editor (Home >> Software >> MultiPHP INI Editor)
; For more information, read our documentation (https://go.cpanel.net/EA4ModifyINI)

; A recommended php.ini for a typical web application
; Use this for changing values, not for enabling extensions in cPanel.

; --- File Uploads ---
; Make sure post_max_size is larger than upload_max_filesize.
[PHP]
upload_max_filesize = 64M
post_max_size = 70M

; --- Performance & Resource Limits ---
; Maximum amount of memory a script may consume.
memory_limit = 200M

; Maximum time in seconds a script is allowed to run before it is terminated.
max_execution_time = 30

; Maximum time in seconds a script is allowed to parse input data, like POST and GET.
max_input_time = 30

; --- Error Handling (Recommended for a LIVE site) ---
; Do not show errors to the public, as this is a security risk.
display_errors = On

; Log errors to a file instead.
log_errors = On

; Enable the FileInfo extension to fix the mime_content_type() error

; ; Enable the MySQL Improved extension for database connections
; extension=mysqli.so

; ; Enable PHP Data Objects (PDO) - the base extension
; extension=pdo.so

; ; Enable the PDO driver for MySQL
; extension=pdo_mysql.so
error_log = "/home/mssnorg/logs/php_errors.log"
max_input_vars = 3000
session.gc_maxlifetime = 1440
session.save_path = "/var/cpanel/php/sessions/ea-php84"
zlib.output_compression = On
